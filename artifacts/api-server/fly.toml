# fly.toml app configuration file generated for puiseapp on 2026-05-28T13:52:16Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'puiseapp'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
